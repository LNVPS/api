db: "mysql://root:root@localhost:3377/lnvps"
# Payment providers (LND Lightning + on-chain) are seeded into the
# payment_method_config table by scripts/run-e2e.sh, not configured here.
delete-after: 3
public-url: "http://localhost:8000"
read-only: true
redis:
  url: "redis://localhost:6399"
  ttl: 30
nostr:
  relays:
    - "ws://localhost:7766"
  nsec: "nsec1q6qm0rwu7ws4pcrqmyhrks2p0c8ht95c5u0r44ukt5fzwur5sg4s0msjlw"
encryption:
  key-file: "/tmp/e2e-encryption.key"
  auto-generate: true
# Passkey (WebAuthn) config for the passkey e2e tests. rp-origin must match the
# public origin the tests hit (public-url above).
webauthn:
  rp-id: "localhost"
  rp-origin: "http://localhost:8000"
  rp-name: "LNVPS E2E"
  require-resident-key: true
# Shared session JWT settings (required for passkey/OAuth Bearer tokens).
session:
  secret: "e2e-session-secret-not-for-production-0123456789abcdef"
  ttl: 3600
# Automated referral commission payouts. Enabled with low thresholds so the
# e2e payout tests exercise Lightning + on-chain payouts. The fee estimator is
# fixed (regtest has no mempool.space); 2 sat/vByte is below the 50 cap so
# batches broadcast.
referral:
  min-payout-sats: 1
  min-onchain-payout-sats: 1
  max-onchain-fee-per-vbyte: 50
  fee-estimator:
    fixed:
      sat-per-vbyte: 2
provisioner:
  proxmox:
    qemu:
      bios: "ovmf"
      machine: "q35"
      os-type: "l26"
      bridge: "vmbr0"
      cpu: "host"
      kvm: false
      arch: "x86_64"
