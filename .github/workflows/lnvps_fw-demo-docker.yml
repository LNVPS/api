name: Build lnvps_fw demo image

# Builds the standalone lnvps_fw demo API (the serve_api example: control API +
# dashboard fed by a simulated traffic generator, no eBPF datapath needed at
# runtime) into a container image and pushes it to Docker Hub. Manual dispatch
# only — it exists purely to deploy the firewall dashboard for demonstration.
#
# Requires two repo secrets for the Docker Hub push:
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (an access token with write scope).
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: voidic/lnvps-fw-demo

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: lnvps_fw
          file: lnvps_fw/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
