db: "mysql://root:root@localhost:3376/lnvps"
# Payment providers (Lightning node, on-chain wallet, Revolut, ...) are no
# longer configured here. They are stored in the database `payment_method_config`
# table (per company) and managed via the admin API
# (POST/PATCH /api/admin/v1/payment_method_configs).
delete-after: 3
# Global default maximum prepay/renewal window in days. A renewal is rejected
# once it would push a subscription's expiry beyond now + this many days. Used
# when a company's own max_prepay_days is 0 (unset). Defaults to 365 if omitted.
max-prepay-days: 365
# Automated referral commission payouts (opt-in). Omit this section to disable
# automatic payouts (commission still accrues and can be paid manually by admins).
referral:
  # Minimum accrued BTC commission (satoshis) before a Lightning payout is
  # attempted.
  min-payout-sats: 1000
  # Minimum accrued BTC commission (satoshis) before an *on-chain* payout is
  # attempted. On-chain payouts for all eligible referrers are batched into a
  # single send-many transaction. The referrer bears the network fee (it is
  # debited from their balance), and this minimum acts as a small buffer to
  # absorb it. Defaults to 1000. Set to null to disable on-chain payouts.
  min-onchain-payout-sats: 1000
  # Maximum next-block fee rate (sat/vByte) tolerated for on-chain payouts. The
  # current rate is obtained from fee-estimator before each batch; if it exceeds
  # this cap the batch is deferred until fees drop. Defaults to 50.
  max-onchain-fee-per-vbyte: 50
  # Source of the on-chain fee-rate estimate. Defaults to mempool.space; use a
  # fixed rate for regtest/testing where mempool.space is unreachable.
  fee-estimator:
    mempool:
      url: "https://mempool.space"
  #fee-estimator:
  #  fixed:
  #    sat-per-vbyte: 2
public-url: "https://api.lnvps.net"
read-only: false
redis:
  url: "redis://localhost:6398"
  ttl: 30
# Database field encryption. The LNVPS_ENCRYPTION_KEY environment variable
# (hex-encoded 32-byte key) takes precedence; the key file below is used as a
# fallback when that variable is not set.
encryption:
  key-file: "encryption.key"
  auto-generate: true
provisioner:
  proxmox:
    qemu:
      bios: "ovmf"
      machine: "q35"
      os-type: "l26"
      bridge: "vmbr0"
      cpu: "host"
      vlan: 100
      kvm: false
      arch: x86_64
      # Auto-ballooning floor as a percentage of a VM's sold RAM (1..=99).
      # When set, PVE auto-ballooning may reclaim up to (100 - pct)% of a VM's
      # RAM under host memory pressure, guarding against host OOM-kills.
      # Unset / 0 / >= 100 disables dynamic ballooning (default).
      #balloon-min-pct: 90
# Captcha is used in various places to prevent spam
captcha:
  # Turnstile is a Cloudflare captcha product
  turnstile:
    secret-key: "1x0000000000000000000000000000000AA"
# Telegram notification channel (optional). Create a bot via @BotFather.
# When set, users can link their chat from account settings and receive
# notifications via Telegram.
#telegram:
#  token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
#  username: "my_lnvps_bot"
# WhatsApp notification channel (optional) via the Meta Cloud API.
# Both templates must be approved and have a single body parameter {{1}}.
#whatsapp:
#  access-token: "EAAG..."
#  phone-number-id: "1234567890"
#  api-version: "v21.0"
#  message-template: "lnvps_notification"
#  message-template-lang: "en"
#  verify-template: "lnvps_verification"
#  verify-template-lang: "en"
# Generic OAuth / OIDC login (optional). When set, users can log in via
# external identity providers and receive a session JWT that is accepted on
# authenticated endpoints as `Authorization: Bearer <jwt>` (alongside NIP-98).
# Requires the shared `session` block below to be set.
#oauth:
#  # Optional: after login, redirect the browser here with `#token=<jwt>`.
#  # When omitted, the callback returns the token as JSON.
#  success-redirect: "https://app.example.com/oauth/complete"
#  # Providers are keyed by a stable tag (part of the account identity). Each
#  # has a `type` selecting the flavor; built-in flavors supply default
#  # endpoints/scopes so usually only credentials are needed.
#  providers:
#    google:
#      type: google
#      client-id: "xxxx.apps.googleusercontent.com"
#      client-secret: "xxxx"
#    github:
#      type: github
#      client-id: "Iv1.xxxx"
#      client-secret: "xxxx"
#    facebook:
#      type: facebook
#      client-id: "1234567890"
#      client-secret: "xxxx"
#    apple:
#      type: apple
#      client-id: "com.example.service"   # Services ID
#      team-id: "ABCDE12345"
#      key-id: "XYZ1234567"
#      # PEM contents of the downloaded .p8 key
#      private-key: |
#        -----BEGIN PRIVATE KEY-----
#        MIGTAgEA...
#        -----END PRIVATE KEY-----
#      # Requesting name/email switches Apple to a POST (form_post) callback:
#      #scopes: ["name", "email"]
#    # Fully generic provider (explicit endpoints required):
#    #keycloak:
#    #  type: oidc
#    #  client-id: "xxxx"
#    #  client-secret: "xxxx"
#    #  auth-url: "https://id.example.com/authorize"
#    #  token-url: "https://id.example.com/token"
#    #  userinfo-url: "https://id.example.com/userinfo"
#    #  scopes: ["openid", "email"]
#    #  subject-field: "sub"
# Passwordless WebAuthn / passkey login (optional). When set, users can create
# an account and log in with a platform passkey (Face ID / Touch ID / Windows
# Hello) or a security key, and receive the same session JWT as OAuth
# (`Authorization: Bearer <jwt>`). Login is usernameless (discoverable).
# Requires the shared `session` block below to be set.
#webauthn:
#  # Relying Party ID: the registrable domain passkeys are bound to. PERMANENT —
#  # changing it invalidates every registered passkey.
#  rp-id: "app.example.com"
#  # The exact origin the frontend runs on (host must equal or be a subdomain of
#  # rp-id).
#  rp-origin: "https://app.example.com"
#  # Human-friendly name shown in the authenticator prompt.
#  rp-name: "LNVPS"
#  # Require a discoverable (resident-key) credential at registration so
#  # usernameless "Sign in with a passkey" works on all authenticators
#  # (platform passkeys, security keys, Windows Hello). Default: true. Only set
#  # false to work around an authenticator that refuses resident-key
#  # registration (its credentials then won't work for usernameless login).
#  require-resident-key: true
# Shared session-token settings. Required whenever `oauth` or `webauthn` is
# enabled — both issue the same stateless session JWTs. Omit to disable Bearer
# session auth entirely (Nostr / NIP-98 only).
#session:
#  # Strong, stable random secret used to sign session JWTs (and the OAuth CSRF
#  # `state` / WebAuthn challenge tokens). Changing it invalidates all sessions.
#  secret: "change-me-to-a-long-random-string"
#  # Session lifetime in seconds (default 30 days).
#  ttl: 2592000
