# Example lnvps_fw_service configuration.
#
# Run with:  lnvps_fw_service --config config.yaml
# (or pass bare interface names:  lnvps_fw_service eno2 eno3)

# Interfaces to attach to. Two forms:
#
#   host   (default): a bare name -- single NIC that carries the protected IPs.
#                      XDP filter (ingress) + TC-egress port learning.
#
#   router mode: split roles across a forwarding router's NICs --
#     - role: filter  XDP ingress filter on the internet-facing NIC(s). It is
#                     GRE-decap-aware, so attack traffic to protected IPs is
#                     dropped even inside BGP-over-GRE tunnels (attach to the
#                     *underlay* NIC to shed the flood before decap+routing).
#     - role: learn   TC-ingress port learning on the VM-facing NIC (VM replies
#                     enter here as plain L2). No filtering.
#
# Host example:
interfaces:
  - eno2
#
# Router example (BGP-over-GRE underlays + a VM-facing NIC):
# interfaces:
#   - { name: ens19, role: filter }   # underlay (GRE-decapped + filtered)
#   - { name: ens20, role: filter }
#   - { name: interix, role: filter } # direct L2 peering
#   - { name: ens21, role: learn }    # VM network (learn open ports)

# Protected prefixes this host/router defends. This is the SCOPE of the whole
# firewall:
#   * If set, XDP only counts/mitigates traffic to these destinations and
#     PASSES everything else untouched (essential on a forwarding router so it
#     never touches third-party transit traffic), and port-learning is limited
#     to these IPs.
#   * If EMPTY, the firewall protects EVERY destination it sees (single-NIC
#     host mode). Do NOT leave this empty on a router.
# It also enables prefix-wide (carpet-bomb) mitigation: if the aggregate rate
# across a whole prefix crosses the network thresholds, the entire prefix flips
# to mitigation in one LPM entry even if no single IP trips its own threshold.
# (Can also be pushed via the control API.)
protected:
  - 203.0.113.0/24
  # - 2001:db8:1::/48

# Aggregate per-prefix detection thresholds (defaults are network-scale so a
# prefix only flips under a genuine carpet bomb).
network:
  pps: 500000
  syn-pps: 50000
  bps: 5000000000
  exit-pct: 50
  cooldown-secs: 30

# Passive port-learning / garbage-collection parameters.
learning:
  # Forget a learned open port after this long without matching egress traffic.
  port-ttl-secs: 600
  # Shorter TTL for learned UDP ports: UDP has no handshake so learning also
  # captures ephemeral client source ports; a short TTL sheds that pollution
  # while real UDP services keep getting refreshed.
  udp-port-ttl-secs: 120
  # How often the userspace GC sweeps expired learned ports.
  gc-interval-secs: 60
  # How often per-destination stats are logged (0 disables logging).
  stats-interval-secs: 5

# Attack-detection thresholds and hysteresis per destination IP.
thresholds:
  # Entry thresholds: exceeding any one flips the destination into mitigation.
  pps: 100000
  syn-pps: 10000
  bps: 1000000000
  # Leave mitigation only once every rate falls below this percentage of its
  # entry threshold (hysteresis)...
  exit-pct: 50
  # ...and stays there for this many seconds (cooldown).
  cooldown-secs: 30
  # How often the detection loop samples the per-destination counters.
  sample-interval-ms: 500

# Per-source rate limiting while a destination is mitigating.
# The rate machine lives IN the XDP datapath: the kernel counts each source
# over a fixed 1s window and blocks over-rate sources in-line (drops engage
# once the destination escalates to SOURCE_BLOCK). Userspace only writes this
# config into the datapath and reads the state for display — it is not in the
# decision path. This is a defence against real (unspoofed) botnets; spoofed
# floods never trip a per-source limit and are handled by the port-filter /
# SYN-proxy layers.
escalation:
  # A source is blocked once it sends more than this many packets within one
  # 1s window toward a mitigated destination. Keep this well above what shared
  # infrastructure (CDN/reverse-proxy edges, CGNAT, corporate NAT) legitimately
  # sends to one origin — a busy CDN edge easily sustains hundreds–thousands of
  # pps. Also runtime-editable via PUT /api/v1/limits (src_rate_pps).
  src-rate-pps: 10000
  # How long a tripped source stays blocked before re-evaluation. A source
  # still over-rate re-extends its block every window, so the block outlives
  # the flood by exactly one cooldown.
  src-cooldown-secs: 10
  # Escalate a mitigating dest/prefix to source blocking only if this many
  # packets/second are still getting through after the port-filter layer.
  escalate-pass-pps: 50000
  # Enable the SYN-proxy (SYN-cookie handshake validation) on a mitigating
  # dest/prefix once its SYN rate reaches this many SYNs/second.
  # 0 DISABLES the SYN-proxy entirely -- set 0 on tunneled / asymmetric-routed
  # routers (GRE-backed VMs, non-GRE tunnels, or reply traffic on a different
  # NIC): the SYN-proxy XDP_TX's a cookie SYN-ACK out the ingress NIC and
  # cannot re-encapsulate it or steer it to another egress, so it would
  # black-hole real services rather than protect them.
  syn-proxy-syn-pps: 5000
  # Per-destination budget of NEW distinct-port probes/second the port filter
  # leaks through while mitigating, so a genuinely-open TCP or UDP port that was
  # not learned before the flood can still answer and be learned. Each unknown
  # port is probed once (first-touch): leaked for a short grace window, then —
  # if still unlearned — assumed closed and suppressed, re-probed periodically
  # in case it opens later. Amplification-safe (probe key is (dest,port), so a
  # spoofed UDP amp flood to one port leaks ~1 packet/cycle). WireGuard
  # handshake-init packets are fast-pathed so tunnels re-establish even under a
  # garbage flood to their port. Without this the port filter black-holes any
  # open port missing from the learned set for the whole flood. 0 disables it.
  learn-leak-pps: 100

# RESTful control API (increment 7). Omit this whole section to disable it.
# HTTPS is mandatory: if no cert/key is given a self-signed pair is generated
# at startup. lnvps_api is the client -- it pushes rules and polls state/events;
# this daemon keeps no database. An internal HTML dashboard is served at `/`.
api:
  # Address to bind the HTTPS listener to (keep it on a management interface).
  listen: 127.0.0.1:8888
  # Bearer token required on every request.
  token: "change-me-to-a-long-random-secret"
  # Optional PEM cert/key; self-signed if omitted.
  # tls-cert: /etc/lnvps_fw/api.crt
  # tls-key: /etc/lnvps_fw/api.key
  # Optional source-IP allow-list (empty = any peer may connect).
  allow-ips: []
  # Bounded in-memory event ring-buffer size (lnvps_api persists history).
  events-buffer: 1024
  # GitHub owner/repo checked for self-upgrade releases (the dashboard shows an
  # upgrade button when a newer release with a .deb asset exists).
  github-repo: LNVPS/api
  # Allow POST /api/v1/upgrade to install a new release as root and restart.
  # OFF by default: a network-triggered root package install is a powerful
  # primitive. Enable only if you want remote/dashboard-driven upgrades.
  allow-remote-upgrade: false
  # Optional minisign public key. When set, a downloaded .deb is installed only
  # if a matching `.deb.minisig` release asset verifies against this key
  # (fail-closed). Leave unset to rely on the GitHub-reported SHA-256 digest.
  # upgrade-pubkey: "RWQ...base64..."
