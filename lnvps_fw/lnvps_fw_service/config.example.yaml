# Example lnvps_fw_service configuration.
#
# Run with:  lnvps_fw_service --config config.yaml
# (or pass bare interface names:  lnvps_fw_service eno2 eno3)

# Uplink interface(s) to attach the XDP ingress + TC egress programs to.
interfaces:
  - eno2

# Protected prefixes this host serves. Enables prefix-wide (carpet-bomb)
# mitigation: if the aggregate rate across a whole prefix crosses the network
# thresholds, the entire prefix flips to mitigation in one LPM entry, even if no
# single IP trips its own threshold. (Populated from the API in a later step.)
protected:
  - 203.0.113.0/24
  # - 2001:db8:1::/48

# Aggregate per-prefix detection thresholds (defaults are network-scale so a
# prefix only flips under a genuine carpet bomb).
network:
  pps: 500000
  syn-pps: 50000
  bps: 5000000000
  exit-pct: 50
  cooldown-secs: 30

# Passive port-learning / garbage-collection parameters.
learning:
  # Forget a learned open port after this long without matching egress traffic.
  port-ttl-secs: 600
  # How often the userspace GC sweeps expired learned ports.
  gc-interval-secs: 60
  # How often per-destination stats are logged (0 disables logging).
  stats-interval-secs: 5

# Attack-detection thresholds and hysteresis per destination IP.
thresholds:
  # Entry thresholds: exceeding any one flips the destination into mitigation.
  pps: 100000
  syn-pps: 10000
  bps: 1000000000
  # Leave mitigation only once every rate falls below this percentage of its
  # entry threshold (hysteresis)...
  exit-pct: 50
  # ...and stays there for this many seconds (cooldown).
  cooldown-secs: 30
  # How often the detection loop samples the per-destination counters.
  sample-interval-ms: 500

# Per-source detection + CIDR aggregation while a destination is mitigating.
# NOTE: the eBPF datapath only COUNTS per source (bounded LRU) and enforces the
# CIDR block trie; all rate math and block decisions are made here in userspace.
# This is a secondary defence aimed at real (unspoofed) botnets; spoofed
# carpet-bomb floods are handled by per-destination mitigation + the
# drop-to-non-open-ports policy, not by source blocking.
escalation:
  # A source is an offender once its per-window rate reaches this many pps
  # toward a mitigated destination.
  src-rate-pps: 500
  # Aggregation fan-out: this many child prefixes under a common parent
  # collapse into one wider block (/32->/24->/16->/8), keeping the LPM trie
  # bounded under distributed floods.
  agg-fanout: 4
  # A CIDR block is lifted this many seconds after it stops being refreshed.
  block-ttl-secs: 300
