# Example lnvps_fw_service configuration.
#
# Run with:  lnvps_fw_service --config config.yaml
# (or pass bare interface names:  lnvps_fw_service eno2 eno3)

# Interfaces to attach to. Two forms:
#
#   host   (default): a bare name -- single NIC that carries the protected IPs.
#                      XDP filter (ingress) + TC-egress port learning.
#
#   router mode: split roles across a forwarding router's NICs --
#     - role: filter  XDP ingress filter on the internet-facing NIC(s). It is
#                     GRE-decap-aware, so attack traffic to protected IPs is
#                     dropped even inside BGP-over-GRE tunnels (attach to the
#                     *underlay* NIC to shed the flood before decap+routing).
#     - role: learn   TC-ingress port learning on the VM-facing NIC (VM replies
#                     enter here as plain L2). No filtering.
#
# Host example:
interfaces:
  - eno2
#
# Router example (BGP-over-GRE underlays + a VM-facing NIC):
# interfaces:
#   - { name: ens19, role: filter }   # underlay (GRE-decapped + filtered)
#   - { name: ens20, role: filter }
#   - { name: interix, role: filter } # direct L2 peering
#   - { name: ens21, role: learn }    # VM network (learn open ports)

# Protected prefixes this host/router defends. This is the SCOPE of the whole
# firewall:
#   * If set, XDP only counts/mitigates traffic to these destinations and
#     PASSES everything else untouched (essential on a forwarding router so it
#     never touches third-party transit traffic), and port-learning is limited
#     to these IPs.
#   * If EMPTY, the firewall protects EVERY destination it sees (single-NIC
#     host mode). Do NOT leave this empty on a router.
# It also enables prefix-wide (carpet-bomb) mitigation: if the aggregate rate
# across a whole prefix crosses the network thresholds, the entire prefix flips
# to mitigation in one LPM entry even if no single IP trips its own threshold.
# (Can also be pushed via the control API.)
protected:
  - 203.0.113.0/24
  # - 2001:db8:1::/48

# Aggregate per-prefix detection thresholds (defaults are network-scale so a
# prefix only flips under a genuine carpet bomb).
network:
  pps: 500000
  syn-pps: 50000
  bps: 5000000000
  exit-pct: 50
  cooldown-secs: 30

# Passive port-learning / garbage-collection parameters.
learning:
  # Forget a learned open port after this long without matching egress traffic.
  port-ttl-secs: 600
  # How often the userspace GC sweeps expired learned ports.
  gc-interval-secs: 60
  # How often per-destination stats are logged (0 disables logging).
  stats-interval-secs: 5

# Attack-detection thresholds and hysteresis per destination IP.
thresholds:
  # Entry thresholds: exceeding any one flips the destination into mitigation.
  pps: 100000
  syn-pps: 10000
  bps: 1000000000
  # Leave mitigation only once every rate falls below this percentage of its
  # entry threshold (hysteresis)...
  exit-pct: 50
  # ...and stays there for this many seconds (cooldown).
  cooldown-secs: 30
  # How often the detection loop samples the per-destination counters.
  sample-interval-ms: 500

# Per-source detection + CIDR aggregation while a destination is mitigating.
# NOTE: the eBPF datapath only COUNTS per source (bounded LRU) and enforces the
# CIDR block trie; all rate math and block decisions are made here in userspace.
# This is a secondary defence aimed at real (unspoofed) botnets; spoofed
# carpet-bomb floods are handled by per-destination mitigation + the
# drop-to-non-open-ports policy, not by source blocking.
escalation:
  # A source is an offender once its per-window rate reaches this many pps
  # toward a mitigated destination.
  src-rate-pps: 500
  # Aggregation fan-out: this many child prefixes under a common parent
  # collapse into one wider block (/32->/24->/16->/8), keeping the LPM trie
  # bounded under distributed floods.
  agg-fanout: 4
  # A CIDR block is lifted this many seconds after it stops being refreshed.
  block-ttl-secs: 300
  # Escalate a mitigating dest/prefix to source blocking (level 4) only if this
  # many packets/second are still getting through after the port-filter layer.
  escalate-pass-pps: 50000
  # Spoof gate: if more than this many distinct offenders appear in a window,
  # treat the flood as spoofed and skip source blocking entirely (rely on the
  # port filter). Source blocking only makes sense for bounded, real botnets.
  max-real-sources: 10000
  # Enable the SYN-proxy (SYN-cookie handshake validation) on a mitigating
  # dest/prefix once its SYN rate reaches this many SYNs/second.
  syn-proxy-syn-pps: 5000

# RESTful control API (increment 7). Omit this whole section to disable it.
# HTTPS is mandatory: if no cert/key is given a self-signed pair is generated
# at startup. lnvps_api is the client -- it pushes rules and polls state/events;
# this daemon keeps no database. An internal HTML dashboard is served at `/`.
api:
  # Address to bind the HTTPS listener to (keep it on a management interface).
  listen: 127.0.0.1:8888
  # Bearer token required on every request.
  token: "change-me-to-a-long-random-secret"
  # Optional PEM cert/key; self-signed if omitted.
  # tls-cert: /etc/lnvps_fw/api.crt
  # tls-key: /etc/lnvps_fw/api.key
  # Optional source-IP allow-list (empty = any peer may connect).
  allow-ips: []
  # Bounded in-memory event ring-buffer size (lnvps_api persists history).
  events-buffer: 1024
